server:
  port: 9091

spring:
  application:
    name: atheris-tenant
  datasource:
    url: jdbc:postgresql://localhost:5432/atheris_tenant
    username: atheris
    password: changeme
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: tenant
  flyway:
    enabled: true
    locations: classpath:db/migration/tenant
    schemas: tenant
    create-schemas: true
    default-schema: tenant

atheris:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-base64-secret}
    expiry-minutes: 1440
  tenant-id: ${TENANT_ID:}
  webhook-secret: ${WEBHOOK_SECRET:}
