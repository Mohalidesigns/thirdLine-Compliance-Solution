server:
  port: 9091

spring:
  application:
    name: atheris-compliance-tenant-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/atheris_tenant
    username: atheris
    password: changeme
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration/tenant

atheris:
  admin:
    username: ${ADMIN_USERNAME:admin@atheris.ng}
    password: ${ADMIN_PASSWORD:admin123}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-base64-secret}
    expiry-minutes: 1440
  tenant-id: ${TENANT_ID:1}
  webhook-secret: ${WEBHOOK_SECRET:}
  platform:
    base-url: ${PLATFORM_BASE_URL:http://localhost:9090}
    internal-api-key: ${INTERNAL_API_KEY:dev-internal-key-change-in-prod}
