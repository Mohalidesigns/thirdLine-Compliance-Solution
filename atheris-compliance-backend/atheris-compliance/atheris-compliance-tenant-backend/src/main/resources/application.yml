server:
  port: 9091

spring:
  application:
    name: atheris-compliance-tenant-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/atheris_tenant
    username: atheris
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration/tenant

atheris:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-base64-secret}
    expiry-minutes: 1440
  tenant-id: ${TENANT_ID:1}
  webhook-secret: ${WEBHOOK_SECRET:}
  platform:
    base-url: ${PLATFORM_BASE_URL:http://localhost:9090}
    encryption-key: ${ENCRYPTION_KEY:temporary-dev-encryption-key-change-in-prod}
